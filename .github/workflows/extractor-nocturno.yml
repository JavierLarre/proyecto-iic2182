name: Extractor - Mercado Público

# ─────────────────────────────────────────────────────────
# 4 sesiones diarias espaciadas 6h — ninguna se superpone
# con la siguiente (cada sesión tarda máx 5h 30m).
#
# UTC  → Santiago (CLT/UTC-4 invierno | CLST/UTC-3 verano)
# 00:00 → 20:00 / 21:00
# 06:00 → 02:00 / 03:00
# 12:00 → 08:00 / 09:00
# 18:00 → 14:00 / 15:00
# ─────────────────────────────────────────────────────────
on:
  schedule:
    - cron: '0 0,6,12,18 * * *'

  # Ejecución manual desde GitHub UI o API
  workflow_dispatch:
    inputs:
      hasta:
        description: 'Fecha más antigua a procesar (ddmmaaaa)'
        required: false
        default: '01012025'
      solo:
        description: 'Tipo a extraer (licitaciones | ordenes | ambos)'
        required: false
        default: 'ambos'
      max_requests:
        description: 'Límite de requests para esta corrida'
        required: false
        default: '28000'

jobs:
  extraer:
    name: Descarga datos de ChileCompra → Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 340   # Máximo ~5h40m (límite de GH Actions es 6h)

    env:
      MERCADOPUBLICO_TICKET_1: ${{ secrets.MERCADOPUBLICO_TICKET_1 }}
      MERCADOPUBLICO_TICKET_2: ${{ secrets.MERCADOPUBLICO_TICKET_2 }}
      MERCADOPUBLICO_TICKET_3: ${{ secrets.MERCADOPUBLICO_TICKET_3 }}
      SUPABASE_URL:             ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache de dependencias pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Instalar dependencias
        run: pip install -r scripts/requirements.txt

      - name: Verificar conexión a Supabase
        run: |
          python3 -c "
          import os
          from supabase import create_client
          sb = create_client(os.environ['SUPABASE_URL'], os.environ['SUPABASE_SERVICE_ROLE_KEY'])
          res = sb.table('extraccion_log').select('count', count='exact').execute()
          print(f'Supabase OK — {res.count} entradas en extraccion_log')
          "

      - name: Ejecutar extractor (modo auto)
        working-directory: scripts
        run: |
          # Determinar parámetros: usa inputs del dispatch o defaults del schedule
          HASTA="${{ github.event.inputs.hasta || '01012025' }}"
          SOLO="${{ github.event.inputs.solo || 'ambos' }}"
          MAX_REQ="${{ github.event.inputs.max_requests || '28000' }}"

          ARGS="--modo auto --hasta $HASTA --max-requests $MAX_REQ"

          if [ "$SOLO" = "licitaciones" ]; then
            ARGS="$ARGS --solo licitaciones"
          elif [ "$SOLO" = "ordenes" ]; then
            ARGS="$ARGS --solo ordenes"
          fi

          echo "Corriendo: python extractor.py $ARGS"
          python extractor.py $ARGS

      - name: Resumen de resultados
        if: always()
        continue-on-error: true   # nunca falla el job — es solo informativo
        run: |
          python3 -c "
          import os
          from supabase import create_client

          sb = create_client(os.environ['SUPABASE_URL'], os.environ['SUPABASE_SERVICE_ROLE_KEY'])

          # Usar extraccion_log (tabla pequeña, siempre rápida) en vez de
          # COUNT(*) sobre licitaciones/ordenes_compra que puede hacer timeout
          # en el free tier de Supabase tras horas de escrituras masivas.
          logs = sb.table('extraccion_log').select('estado,tipo').execute().data or []

          completados = [r for r in logs if r['estado'] == 'completado']
          errores     = [r for r in logs if r['estado'] == 'error']
          parciales   = [r for r in logs if r['estado'] == 'parcial']
          pendientes  = [r for r in logs if r['estado'] == 'pendiente']

          print('─' * 40)
          print(f'Fechas completadas:   {len(completados):,}')
          print(f'Fechas con error:     {len(errores):,}')
          print(f'Fechas parciales:     {len(parciales):,}')
          print(f'Fechas pendientes:    {len(pendientes):,}')
          print(f'Total en log:         {len(logs):,}')
          print('─' * 40)
          "
